<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Медсестры</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-20">

    <div id="fullscreen-overlay" class="hidden fixed inset-0 bg-red-600 z-50 flex flex-col justify-center items-center text-center p-6 animate-pulse">
        <h1 class="text-5xl font-black text-white mb-4">🚨 ВЫЗОВ ДОКТОРА! 🚨</h1>
        <p id="alert-msg-text" class="text-2xl text-white font-bold bg-black bg-opacity-40 p-4 rounded-lg mb-8">Срочно в кабинет!</p>
        <button onclick="closeAlert()" class="bg-white text-red-600 px-8 py-3 rounded-full text-xl font-bold shadow-lg">ПРИНЯТО</button>
    </div>

    <header class="bg-slate-800 p-4 border-b border-slate-700 shadow-md">
        <h1 class="text-xl font-bold text-teal-400">Nurse Helper Mobile</h1>
    </header>

    <main class="p-4">
        <section id="tab-scanner" class="tab-content space-y-4">
            <h2 class="text-lg font-bold border-b border-slate-700 pb-2">📷 Сканер штрих-кодов</h2>
            <div id="reader" class="w-full bg-slate-800 rounded"></div>
            
            <div id="scan-result" class="hidden mt-4 p-4 bg-slate-800 border border-teal-500 rounded-lg">
                <h3 class="text-teal-400 font-bold mb-2" id="res-title">Документ Найден!</h3>
                <p class="text-sm text-white" id="res-body"></p>
                <button onclick="closeScanResult()" class="mt-4 w-full bg-slate-600 text-white py-2 rounded">Очистить</button>
            </div>
        </section>
        <section id="tab-create" class="tab-content active space-y-4">
            <h2 class="text-lg font-bold border-b border-slate-700 pb-2">📋 Оформление результата</h2>
            
            <div>
                <label class="block text-sm text-slate-400 mb-1">Имя Медсестры (Кто заполняет)</label>
                <input type="text" id="nurse-name" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white" placeholder="Иванова М.С.">
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-1">Выбрать Пациента (ID)</label>
                <select id="doc-client-id" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white"></select>
            </div>

            <div class="flex space-x-2">
                <div class="w-1/2">
                    <label class="block text-sm text-slate-400 mb-1">Категория</label>
                    <select id="doc-type" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white">
                        <option value="Результаты анализов">Анализы</option>
                        <option value="Опись состояния">Опись состояния</option>
                    </select>
                </div>
                <div class="w-1/2">
                    <label class="block text-sm text-slate-400 mb-1">Подтип</label>
                    <select id="doc-subtype" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white">
                        <option value="Первичное">Первичное</option>
                        <option value="Вторичное">Вторичное</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-1">Результат / Описание</label>
                <textarea id="doc-content" rows="5" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white" placeholder="Жалобы, температура, давление..."></textarea>
            </div>

            <button onclick="submitDocument()" class="w-full bg-teal-500 text-slate-900 font-bold py-3 rounded-xl shadow-lg active:bg-teal-600">Отправить Доктору</button>
        </section>
        <section id="tab-printer" class="tab-content space-y-4">
            <h2 class="text-lg font-bold border-b border-slate-700 pb-2">🖨️ Центр Печати</h2>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                <h3 class="text-teal-400 font-bold mb-2">📄 Согласие на вмешательство</h3>
                <label class="block text-sm text-slate-400 mb-1">Выберите пациента:</label>
                <select id="consent-client-id" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white mb-3"></select>
                <button onclick="printConsent()" class="w-full bg-blue-500 active:bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md">🖨️ Распечатать бланк согласия</button>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                <h3 class="text-teal-400 font-bold mb-2">📷 Сканировать документ</h3>
                <button onclick="startScanner()" class="w-full bg-slate-700 active:bg-slate-600 text-white font-bold py-2 rounded-lg shadow-md mb-3">Включить камеру</button>
                <div id="reader" class="w-full bg-black rounded"></div>

                <div id="scan-result" class="hidden mt-4 p-3 bg-slate-900 border border-teal-500 rounded-lg">
                    <p class="text-sm text-white" id="res-body"></p>
                    <div class="flex space-x-2 mt-3">
                        <button onclick="printScannedDoc()" class="w-1/2 bg-teal-500 text-slate-900 font-bold py-2 rounded">🖨️ Печать</button>
                        <button onclick="closeScanResult()" class="w-1/2 bg-slate-600 text-white py-2 rounded">Отмена</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-chat" class="tab-content space-y-4">
            <h2 class="text-lg font-bold border-b border-slate-700 pb-2">💬 Вызов Доктора</h2>
            <button onclick="sendAlertToDoctor('Срочно зайдите в процедурный кабинет!')" class="w-full bg-red-500 text-white font-bold py-4 rounded-xl shadow-md">🚨 Процедурный кабинет</button>
            <button onclick="sendAlertToDoctor('Клиенту стало плохо в коридоре!')" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl shadow-md">⚠️ Пациенту плохо!</button>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 flex justify-around text-xs py-2">
        <button onclick="startScanner()" class="flex flex-col items-center text-slate-400"><span class="text-xl">📷</span><span>Скан</span></button>
        <button onclick="switchTab('printer')" class="flex flex-col items-center text-teal-400 font-bold"><span class="text-xl">🖨️</span><span>Принтер</span></button>
        <button onclick="switchTab('create')" class="flex flex-col items-center text-teal-400 font-bold"><span class="text-xl">📄</span><span>Документ</span></button>
        <button onclick="switchTab('chat')" class="flex flex-col items-center text-slate-400"><span class="text-xl">💬</span><span>Связь</span></button>
    </nav>

    <script>
        // === ВПИШИ СЮДА СВОЙ IP ===
        const SERVER_HOST = "192.168.0.111"; 
        const API_URL = `http://${SERVER_HOST}:8000`;
        const WS_URL = `ws://${SERVER_HOST}:8000/ws/nurse`;

        let ws;

        function printConsent() {
            const select = document.getElementById('consent-client-id');
            const clientName = select.options[select.selectedIndex].text;
            const date = new Date().toLocaleDateString('ru-RU');

            const content = `
                <html><head><meta charset="utf-8"><style>body{font-family: sans-serif; padding: 40px; line-height: 1.6;} h2{text-align:center;}</style></head>
                <body>
                    <h2>ИНФОРМИРОВАННОЕ ДОБРОВОЛЬНОЕ СОГЛАСИЕ<br>на медицинское вмешательство</h2>
                    <p>Я, <strong>${clientName}</strong>, в соответствии со ст. 20 Федерального закона "Об основах охраны здоровья граждан в РФ", даю добровольное согласие на проведение медицинского осмотра, сдачу анализов и выполнение процедур.</p>
                    <p>Медицинским работником мне в доступной форме разъяснены цели, методы оказания медицинской помощи, связанный с ними риск и возможные последствия.</p>
                    <br><br><br>
                    <p>Дата: <strong>${date}</strong> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Подпись пациента: ___________________</p>
                    <script>window.onload = function() { window.print(); }
            `;
            // Открываем новую вкладку браузера на телефоне и сразу печатаем
            const printWin = window.open('', '_blank');
            printWin.document.write(content);
            printWin.document.close();
        }

        // --- ЛОГИКА СКАНЕРА И ПЕЧАТИ ДОКУМЕНТА ---
        let html5QrcodeScanner = null;
        let currentScannedDoc = null; // Храним данные найденного документа

        function startScanner() {
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 100} }, false);
                html5QrcodeScanner.render(onScanSuccess, () => {});
            }
        }

        async function onScanSuccess(decodedText) {
            if(decodedText.length === 8) {
                try {
                    const res = await fetch(`${API_URL}/doc/${decodedText}`);
                    if(res.ok) {
                        currentScannedDoc = await res.json();
                        document.getElementById('res-body').innerHTML = `
                            <span class="text-teal-400 font-bold">Документ №${currentScannedDoc.doc_id}</span><br>
                            <strong>Пациент:</strong> ${currentScannedDoc.client_name}<br>
                            <strong>Тип:</strong> ${currentScannedDoc.type}<br>
                        `;
                        document.getElementById('scan-result').classList.remove('hidden');
                        // Останавливаем сканер после успеха
                        html5QrcodeScanner.clear();
                        html5QrcodeScanner = null;
                    } else {
                        alert("Документ не найден!");
                    }
                } catch(e) { alert("Ошибка связи с сервером"); }
            }
        }

        function printScannedDoc() {
            if(!currentScannedDoc) return;
            const doc = currentScannedDoc;
            const content = `
                <html><head><meta charset="utf-8"><style>body{font-family: sans-serif; padding: 40px;}</style></head>
                <body>
                    <h2>МЕДИЦИНСКИЙ ДОКУМЕНТ №${doc.doc_id}</h2><hr>
                    <p><strong>Пациент:</strong> ${doc.client_name} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>Дата:</strong> ${doc.date}</p>
                    <p><strong>Обследование:</strong> ${doc.type} (${doc.subtype})</p>
                    <p><strong>Ответственный:</strong> ${doc.author_name}</p>
                    <br><h3>Заключение:</h3><p>${doc.content.replace(/\n/g, '<br>')}</p>
                    <script>window.onload = function() { window.print(); }
                </body></html>
            `;
            const printWin = window.open('', '_blank');
            printWin.document.write(content);
            printWin.document.close();
        }

        function closeScanResult() {
            document.getElementById('scan-result').classList.add('hidden');
            currentScannedDoc = null;

        function initWebSocket() {
            ws = new WebSocket(WS_URL);
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === "fullscreen_alert") {
                    document.getElementById('alert-msg-text').innerText = data.message;
                    document.getElementById('fullscreen-overlay').classList.remove('hidden');
                }
            };
            ws.onclose = function() { setTimeout(initWebSocket, 3000); };
        }

        let html5QrcodeScanner = null;

        function startScanner() {
            switchTab('scanner');
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", { fps: 10, qrbox: {width: 250, height: 100} }, false);
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            }
        }

        async function onScanSuccess(decodedText, decodedResult) {
            // Если отсканировали 8 цифр
            if(decodedText.length === 8) {
                try {
                    const res = await fetch(`${API_URL}/doc/${decodedText}`);
                    if(res.ok) {
                        const doc = await res.json();
                        document.getElementById('res-body').innerHTML = `
                            <strong>Номер:</strong> ${doc.doc_id}<br>
                            <strong>Пациент:</strong> ${doc.client_name}<br>
                            <strong>Статус:</strong> ${doc.status}<br><br>
                            <strong>Описание:</strong> ${doc.content}
                        `;
                        document.getElementById('scan-result').classList.remove('hidden');
                    } else {
                        alert("Документ не найден в базе!");
                    }
                } catch(e) {
                    alert("Ошибка связи с сервером");
                }
            }
        }

        function onScanFailure(error) { /* Игнорируем ошибки во время поиска фокуса */ }

        

        function closeScanResult() {
            document.getElementById('scan-result').classList.add('hidden');
        }
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        function closeAlert() { document.getElementById('fullscreen-overlay').classList.add('hidden'); }

        

        function sendAlertToDoctor(text) {
            ws.send(JSON.stringify({to: "doctor", message: text}));
            alert("Сигнал отправлен доктору!");
        }

        async function loadClientsData() {
            try {
                const res = await fetch(`${API_URL}/clients`);
                const clients = await res.json();
                
                const selectDoc = document.getElementById('doc-client-id');
                const selectConsent = document.getElementById('consent-client-id');
                selectDoc.innerHTML = '';
                selectConsent.innerHTML = '';
                
                clients.forEach(c => {
                    const opt = `<option value="${c.id}">${c.name}</option>`;
                    selectDoc.innerHTML += opt;
                    selectConsent.innerHTML += opt; // Добавляем и во вкладку принтера
                });
            } catch (e) { console.error("Ошибка сети", e); }
        }

        async function submitDocument() {
            const nurseName = document.getElementById('nurse-name').value || "Медсестра (без имени)";
            const clientId = document.getElementById('doc-client-id').value;
            const type = document.getElementById('doc-type').value;
            const subtype = document.getElementById('doc-subtype').value;
            const content = document.getElementById('doc-content').value;

            // Получаем сегодняшнюю дату в формате ДД.ММ.ГГГГ
            const today = new Date().toLocaleDateString('ru-RU');

            if(!content) return alert("Заполните содержимое документа!");

            const payload = {
                client_id: parseInt(clientId),
                type: type,
                subtype: subtype,
                date: today,
                content: content,
                author_name: nurseName,
                author_role: "nurse"
            };

            const res = await fetch(`${API_URL}/create_doc`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert(`Успешно! Документу присвоен номер: ${data.doc_id}`);
            document.getElementById('doc-content').value = '';
        }

        initWebSocket();
        loadClientsData();
    </script>
</body>
</html>
