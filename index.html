<!DOCTYPE html>
<html>
<head>
    <title>Nurse Portal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        /* Полноэкранный алерт */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.9); color: white; justify-content: center;
            align-items: center; font-size: 3em; z-index: 1000; text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="this.style.display='none'">
        <span id="alert-text">ВЫЗОВ!</span><br>
        <small style="font-size: 0.3em;">(нажмите, чтобы закрыть)</small>
    </div>

    <h2>Создание записи</h2>
    <input type="text" id="type" placeholder="Тип (Анализ/Опись)"><br><br>
    <textarea id="content" rows="4" cols="50" placeholder="Результаты..."></textarea><br><br>
    <button onclick="sendDoc()">Отправить Доктору</button>

    <hr>
    <h2>Связь с доктором</h2>
    <input type="text" id="msg" placeholder="Сообщение доктору">
    <button onclick="sendDoctorMsg()">Отправить</button>

    <script>
        const ws = new WebSocket("ws://127.0.0.1:8000/ws");

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.to === 'nurse') {
                document.getElementById('alert-text').innerText = data.message;
                document.getElementById('overlay').style.display = 'flex';
            }
        };

        function sendDoctorMsg() {
            const text = document.getElementById('msg').value;
            ws.send(JSON.stringify({to: 'doctor', message: text}));
        }

        async function sendDoc() {
            const type = document.getElementById('type').value;
            const content = document.getElementById('content').value;
            
            const response = await fetch("http://127.0.0.1:8000/create_doc", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({type: type, content: content})
            });
            const data = await response.json();
            alert("Документ создан! ID: " + data.doc_id);
            // Уведомляем доктора, что есть новый документ
            ws.send(JSON.stringify({to: 'doctor', message: "Новый документ: " + data.doc_id}));
        }
    </script>
</body>
</html>
